networks:
  default:
    name: commission-api-deployment_commission-network
    external: true

services:
  monitor-api:
    image: ${MONITOR_API_IMAGE:-clubcrm-monitor-api:deploy}
    build:
      context: ../..
      dockerfile: apps/monitor-api/Dockerfile
    env_file:
      - path: ../../.env.example
        required: true
      - path: ../../.env
        required: false
    environment:
      MONITOR_CLUSTER_KUBECONFIG: ${MONITOR_CLUSTER_KUBECONFIG-/etc/clubcrm-monitor/kubeconfig}
      MONITOR_CLUSTER_SNAPSHOT_FILE: ${MONITOR_CLUSTER_SNAPSHOT_FILE-/app/infra/monitoring/fixtures/k8s-snapshot.json}
      MONITOR_CLUSTER_RECORDING_FILE: ${MONITOR_CLUSTER_RECORDING_FILE:-}
      MONITOR_PROBE_TARGETS: ${MONITOR_PROBE_TARGETS:-}
      MONITOR_PROBE_INTERVAL_SECONDS: ${MONITOR_PROBE_INTERVAL_SECONDS:-5}
      MONITOR_PROBE_TIMEOUT_SECONDS: ${MONITOR_PROBE_TIMEOUT_SECONDS:-2}
      MONITOR_PROBE_DEGRADED_LATENCY_MS: ${MONITOR_PROBE_DEGRADED_LATENCY_MS:-1200}
    volumes:
      - ${MONITOR_CLUSTER_KUBECONFIG_HOST_PATH-../../infra/monitoring/fixtures/k8s-snapshot.json}:${MONITOR_CLUSTER_KUBECONFIG-/etc/clubcrm-monitor/kubeconfig}:ro
    ports:
      - "${MONITOR_API_PORT:-8010}:8010"
    restart: unless-stopped

  monitor-app:
    image: ${MONITOR_WEB_IMAGE:-clubcrm-monitor-web:deploy}
    build:
      context: ../..
      dockerfile: apps/monitor-web/Dockerfile
    env_file:
      - path: ../../.env.example
        required: true
      - path: ../../.env
        required: false
    environment:
      MONITOR_API_BASE_URL: http://monitor-api:8010
      NEXT_PUBLIC_MONITOR_API_BASE_URL: ${NEXT_PUBLIC_MONITOR_API_BASE_URL:-/monitor-api}
      NEXT_PUBLIC_MONITOR_WS_URL: ${NEXT_PUBLIC_MONITOR_WS_URL:-}
      MONITOR_REPLAY_MODE: ${MONITOR_REPLAY_MODE:-false}
      MONITOR_REPLAY_API_URL: ${MONITOR_REPLAY_API_URL:-}
      NEXT_PUBLIC_MONITOR_REPLAY_MODE: ${NEXT_PUBLIC_MONITOR_REPLAY_MODE:-false}
      NEXT_PUBLIC_MONITOR_REPLAY_API_URL: ${NEXT_PUBLIC_MONITOR_REPLAY_API_URL:-}
      PORT: 3002
    depends_on:
      - monitor-api
    restart: unless-stopped

  monitor-web:
    image: nginx:1.27-alpine
    depends_on:
      - monitor-api
      - monitor-app
    volumes:
      - ./nginx.monitor-proxy.conf:/etc/nginx/nginx.conf:ro
    ports:
      - "${MONITOR_WEB_PORT:-3002}:3002"
    restart: unless-stopped
