services:
  api:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    env_file:
      - ../.env
    command: >
      sh -c "bash ./scripts/bootstrap.sh &&
      bash ./scripts/dev-api.sh"
    volumes:
      - ..:/workspace
      - pnpm_store:/pnpm/store
      - api_venv:/workspace/apps/api/.venv
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - mongodb
      - redis
      - kafka

  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    env_file:
      - ../.env
    command: >
      sh -c "corepack enable &&
      pnpm install --config.confirmModulesPurge=false &&
      pnpm dev:web"
    volumes:
      - ..:/workspace
      - pnpm_store:/pnpm/store
    environment:
      CHOKIDAR_USEPOLLING: "true"
    ports:
      - "3000:3000"
    depends_on:
      - api

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mongodb:
    image: mongo:8
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db

  redis:
    image: redis:7
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    restart: unless-stopped
    env_file:
      - ../.env
    ports:
      - "9092:9092"
    volumes:
      - kafka_data:/var/lib/kafka/data

volumes:
  pnpm_store:
  api_venv:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
