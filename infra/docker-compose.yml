services:
  api:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    env_file:
      - path: ../.env.example
        required: true
      - path: ../.env
        required: false
    command:
      - /bin/sh
      - -c
      - |
        python3 ./scripts/bootstrap.py
        exec python3 ./scripts/dev_api.py
    volumes:
      - ..:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - api_venv:/workspace/apps/api/.venv
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      redis:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:${API_PORT:-8000}/health >/dev/null"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 15s

  web:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    env_file:
      - path: ../.env.example
        required: true
      - path: ../.env
        required: false
    command:
      - /bin/sh
      - -c
      - |
        exec python3 ./scripts/dev_web.py
    volumes:
      - ..:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - web_next:/workspace/apps/web/.next
    environment:
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      api:
        condition: service_healthy

  postgres:
    image: postgres:17
    restart: unless-stopped
    env_file:
      - path: ../.env.example
        required: true
      - path: ../.env
        required: false
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-clubcrm} -d ${POSTGRES_DB:-clubcrm}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s

  mongodb:
    image: mongo:8
    restart: unless-stopped
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'mongosh --quiet --eval "db.adminCommand({ ping: 1 }).ok" mongodb://localhost:27017/admin | grep 1 >/dev/null',
        ]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 15s

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5s

  kafka:
    image: confluentinc/cp-kafka:7.8.0
    restart: unless-stopped
    environment:
      CLUSTER_ID: ${CLUSTER_ID:-MkU3OEVBNTcwNTJENDM2Qk}
      KAFKA_NODE_ID: ${KAFKA_NODE_ID:-1}
      KAFKA_PROCESS_ROLES: ${KAFKA_PROCESS_ROLES:-broker,controller}
      KAFKA_CONTROLLER_QUORUM_VOTERS: ${KAFKA_CONTROLLER_QUORUM_VOTERS:-1@kafka:9093}
      KAFKA_LISTENERS: ${KAFKA_LISTENERS:-PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093}
      KAFKA_ADVERTISED_LISTENERS: ${KAFKA_ADVERTISED_LISTENERS:-PLAINTEXT://kafka:9092}
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: ${KAFKA_LISTENER_SECURITY_PROTOCOL_MAP:-PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT}
      KAFKA_CONTROLLER_LISTENER_NAMES: ${KAFKA_CONTROLLER_LISTENER_NAMES:-CONTROLLER}
      KAFKA_INTER_BROKER_LISTENER_NAME: ${KAFKA_INTER_BROKER_LISTENER_NAME:-PLAINTEXT}
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: ${KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: ${KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR:-1}
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: ${KAFKA_TRANSACTION_STATE_LOG_MIN_ISR:-1}
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: ${KAFKA_AUTO_CREATE_TOPICS_ENABLE:-true}
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test:
        ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 >/dev/null 2>&1"]
      interval: 10s
      timeout: 10s
      retries: 20
      start_period: 20s

volumes:
  pnpm_store:
  workspace_node_modules:
  web_node_modules:
  web_next:
  api_venv:
  postgres_data:
  mongodb_data:
  redis_data:
  kafka_data:
