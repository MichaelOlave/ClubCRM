apiVersion: apps/v1
kind: Deployment
metadata:
  name: clubcrm-api
  namespace: clubcrm
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: clubcrm-api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: clubcrm-api
    spec:
      containers:
        - name: api
          image: clubcrm-api:deploy
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          envFrom:
            - configMapRef:
                name: clubcrm-api-env
            - secretRef:
                name: clubcrm-api-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
