apiVersion: apps/v1
kind: Deployment
metadata:
  name: cloudflared-tunnel
  namespace: clubcrm
  labels:
    app: cloudflared
spec:
  replicas: 2
  selector:
    matchLabels:
      app: cloudflared
  template:
    metadata:
      labels:
        app: cloudflared
    spec:
      # Spread the two replicas across different nodes — no node preference.
      # preStop ensures QUIC connections close cleanly so Cloudflare immediately
      # fails over to the surviving replica when a node is drained.
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            - labelSelector:
                matchLabels:
                  app: cloudflared
              topologyKey: kubernetes.io/hostname
      terminationGracePeriodSeconds: 30
      containers:
        - name: cloudflared
          image: cloudflare/cloudflared:latest
          args:
            - tunnel
            - --no-autoupdate
            - --config
            - /etc/cloudflared/config.yaml
            - run
          lifecycle:
            preStop:
              # Give cloudflared 5s to close QUIC connections cleanly before k8s sends SIGTERM.
              # Without this, Cloudflare doesn't detect the connector is gone and keeps
              # returning 502 until the new connector is seen — which can take minutes.
              exec:
                command: ["/bin/sh", "-c", "sleep 5"]
          volumeMounts:
            - name: cloudflared-config
              mountPath: /etc/cloudflared/config.yaml
              subPath: config.yaml
            - name: cloudflared-credentials
              mountPath: /etc/cloudflared/credentials.json
              subPath: credentials.json
          resources:
            limits:
              cpu: "500m"
              memory: "256Mi"
            requests:
              cpu: "100m"
              memory: "128Mi"
        - name: tunnel-proxy
          image: nginx:alpine
          ports:
            - containerPort: 3001
            - containerPort: 3002
          volumeMounts:
            - name: proxy-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
      volumes:
        - name: proxy-config
          configMap:
            name: cloudflared-proxy-config
        - name: cloudflared-config
          configMap:
            name: cloudflared-config
        - name: cloudflared-credentials
          secret:
            secretName: cloudflared-credentials
      restartPolicy: Always
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-proxy-config
  namespace: clubcrm
data:
  default.conf: |
    server {
        listen 3001;
        listen [::]:3001;
        location / {
            proxy_pass http://traefik.kube-system.svc.cluster.local:80;
            proxy_set_header Host clubcrm.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
