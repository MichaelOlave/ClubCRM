apiVersion: v1
kind: ConfigMap
metadata:
  name: cloudflared-proxy-config
  namespace: clubcrm
data:
  default.conf: |
    # Port 3001: Cloudflare Tunnel expects the demo/failover app here
    server {
        listen 3001;
        location / {
            proxy_pass http://traefik.kube-system.svc.cluster.local:80;
            proxy_set_header Host clubcrm.local;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # Port 3002: Extra port for monitoring (optional)
    server {
        listen 3002;
        location / {
            # Map to your local monitoring machine
            proxy_pass http://100.95.238.93:3005;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
