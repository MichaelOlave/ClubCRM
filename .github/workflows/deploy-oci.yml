name: Deploy OCI

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-oci-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: clubcrm-api:deploy

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: clubcrm-web:deploy

      - name: Configure SSH
        env:
          OCI_DEPLOY_SSH_KEY: ${{ secrets.OCI_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload images to Oracle host
        run: |
          docker save clubcrm-api:deploy | gzip -1 | ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "gunzip | docker load"
          docker save clubcrm-web:deploy | gzip -1 | ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "gunzip | docker load"

      - name: Pull latest repo state and restart services
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -euo pipefail
            cd /opt/clubcrm
            GIT_SSH_COMMAND="ssh -i ~/.ssh/clubcrm-repo -o IdentitiesOnly=yes" git pull --ff-only
            docker compose -f infra/docker-compose.production.yml up -d --remove-orphans
          '
