name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"

      - name: Bootstrap toolchain
        run: pnpm bootstrap

      - name: Run CI checks
        run: pnpm verify

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: clubcrm-api:deploy

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: clubcrm-web:deploy

      - name: Configure SSH
        env:
          OCI_DEPLOY_SSH_KEY: ${{ secrets.OCI_DEPLOY_SSH_KEY }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.OCI_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload images to Oracle host
        run: |
          docker save clubcrm-api:deploy | gzip -1 | ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "gunzip | docker load"
          docker save clubcrm-web:deploy | gzip -1 | ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" "gunzip | docker load"

      - name: Pull latest repo state and restart services
        run: |
          ssh "${{ secrets.OCI_USER }}@${{ secrets.OCI_HOST }}" '
            set -euo pipefail
            cd /opt/clubcrm
            GIT_SSH_COMMAND="ssh -i ~/.ssh/clubcrm-repo -o IdentitiesOnly=yes" git pull --ff-only
            docker compose -f infra/docker-compose.production.yml up -d --remove-orphans
          '
