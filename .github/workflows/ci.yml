name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"

      - name: Bootstrap toolchain
        run: pnpm bootstrap

      - name: Run CI checks
        run: pnpm verify

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: clubcrm-api:deploy

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: clubcrm-web:deploy

      - name: Configure SSH
        env:
          OCI_DEPLOY_SSH_KEY: ${{ secrets.OCI_DEPLOY_SSH_KEY }}
          OCI_HOST: ${{ secrets.OCI_HOST }}
          OCI_USER: ${{ secrets.OCI_USER }}
        run: |
          set -euo pipefail
          : "${OCI_DEPLOY_SSH_KEY:?Missing secret OCI_DEPLOY_SSH_KEY}"
          : "${OCI_HOST:?Missing secret OCI_HOST}"
          : "${OCI_USER:?Missing secret OCI_USER}"
          case "$OCI_HOST" in
            *://*)
              echo "OCI_HOST must be a hostname or IP address without a URL scheme." >&2
              exit 1
              ;;
          esac
          install -m 700 -d ~/.ssh
          printf '%s\n' "$OCI_DEPLOY_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          {
            printf 'Host oci-host\n'
            printf '  HostName %s\n' "$OCI_HOST"
            printf '  User %s\n' "$OCI_USER"
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  IdentitiesOnly yes\n'
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking yes\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          ssh-keyscan -T 10 -H "$OCI_HOST" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: |
          set -euxo pipefail
          ssh oci-host 'echo "SSH connection established"'

      - name: Upload images to Oracle host
        run: |
          set -euxo pipefail
          docker save clubcrm-api:deploy | gzip -1 | ssh oci-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '
          docker save clubcrm-web:deploy | gzip -1 | ssh oci-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '

      - name: Pull latest repo state and restart services
        run: |
          ssh oci-host '
            set -euxo pipefail
            cd /opt/clubcrm
            GIT_SSH_COMMAND="ssh -i ~/.ssh/clubcrm-repo -o IdentitiesOnly=yes" git pull --ff-only
            if docker info >/dev/null 2>&1; then
              docker compose -f infra/docker-compose.production.yml up -d --remove-orphans
            elif sudo -n docker info >/dev/null 2>&1; then
              sudo -n docker compose -f infra/docker-compose.production.yml up -d --remove-orphans
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker Compose." >&2
              exit 1
            fi
          '
