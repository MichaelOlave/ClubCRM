name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"

      - name: Bootstrap toolchain
        run: pnpm bootstrap

      - name: Run CI checks
        run: pnpm verify

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: clubcrm-api:deploy

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: clubcrm-web:deploy

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SSH_KEY:?Missing secret DEPLOY_SSH_KEY}"
          : "${DEPLOY_USER:?Missing secret DEPLOY_USER}"
          DEFAULT_DEPLOY_HOST="clubcrm.org"
          DEPLOY_HOST="$(printf '%s' "${DEPLOY_HOST:-}" | tr -d '\r\n')"
          DEPLOY_USER="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n')"
          if [ -z "$DEPLOY_USER" ]; then
            echo "DEPLOY_USER cannot be blank after trimming line endings." >&2
            exit 1
          fi
          candidate_hosts=()
          if [ -n "$DEPLOY_HOST" ]; then
            candidate_hosts+=("$DEPLOY_HOST")
          fi
          if [ "$DEFAULT_DEPLOY_HOST" != "$DEPLOY_HOST" ]; then
            candidate_hosts+=("$DEFAULT_DEPLOY_HOST")
          fi
          if [ "${#candidate_hosts[@]}" -eq 0 ]; then
            echo "No deploy host candidates were configured." >&2
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          touch ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts
          SELECTED_DEPLOY_HOST=""
          failure_output=""
          for candidate_host in "${candidate_hosts[@]}"; do
            candidate_label="configured DEPLOY_HOST"
            include_candidate_in_logs="false"
            if [ "$candidate_host" = "$DEFAULT_DEPLOY_HOST" ] && [ "$candidate_host" != "$DEPLOY_HOST" ]; then
              candidate_label="production domain fallback ($DEFAULT_DEPLOY_HOST)"
              include_candidate_in_logs="true"
            fi
            case "$candidate_host" in
              *://*)
                failure_output="${failure_output}\n- ${candidate_label} used a URL scheme; provide only a hostname or IP address."
                continue
                ;;
            esac
            if ! getent ahosts "$candidate_host" >/dev/null; then
              failure_output="${failure_output}\n- ${candidate_label} did not resolve from the GitHub Actions runner."
              continue
            fi
            keyscan_output="$(mktemp)"
            keyscan_error="$(mktemp)"
            if ssh-keyscan -T 10 -H "$candidate_host" >"$keyscan_output" 2>"$keyscan_error" && [ -s "$keyscan_output" ]; then
              cat "$keyscan_output" >> ~/.ssh/known_hosts
              rm -f "$keyscan_output" "$keyscan_error"
              SELECTED_DEPLOY_HOST="$candidate_host"
              if [ "$candidate_host" = "$DEPLOY_HOST" ] && [ -n "$DEPLOY_HOST" ]; then
                echo "Using DEPLOY_HOST from secrets for SSH."
              else
                echo "Configured DEPLOY_HOST did not return SSH host keys; falling back to $DEFAULT_DEPLOY_HOST."
              fi
              break
            fi
            failure_output="${failure_output}\n- ${candidate_label} resolved but did not return SSH host keys on port 22."
            if [ "$include_candidate_in_logs" = "true" ] && [ -s "$keyscan_error" ]; then
              keyscan_summary="$(tr '\n' ' ' <"$keyscan_error" | sed 's/[[:space:]]\+/ /g')"
              failure_output="${failure_output}\n  ssh-keyscan: ${keyscan_summary}"
            fi
            rm -f "$keyscan_output" "$keyscan_error"
          done
          if [ -z "$SELECTED_DEPLOY_HOST" ]; then
            echo "Unable to determine a reachable deploy host." >&2
            printf '%b\n' "$failure_output" >&2
            exit 1
          fi
          {
            printf 'Host deploy-host\n'
            printf '  HostName %s\n' "$SELECTED_DEPLOY_HOST"
            printf '  User %s\n' "$DEPLOY_USER"
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  IdentitiesOnly yes\n'
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking yes\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Verify SSH connectivity
        run: |
          set -euxo pipefail
          ssh deploy-host 'echo "SSH connection established"'

      - name: Upload images to deploy host
        run: |
          set -euxo pipefail
          docker save clubcrm-api:deploy | gzip -1 | ssh deploy-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '
          docker save clubcrm-web:deploy | gzip -1 | ssh deploy-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '

      - name: Pull latest repo state and restart services
        run: |
          ssh deploy-host '
            set -euxo pipefail
            cd /opt/clubcrm
            GIT_SSH_COMMAND="ssh -i ~/.ssh/clubcrm-repo -o IdentitiesOnly=yes" git pull --ff-only
            compose_files="-f infra/docker-compose.production.yml"
            if [ -f infra/docker-compose.production.host-nginx.yml ]; then
              compose_files="$compose_files -f infra/docker-compose.production.host-nginx.yml"
            fi
            log_deploy_failure() {
              if docker info >/dev/null 2>&1; then
                docker compose $compose_files ps || true
                docker compose $compose_files logs api --tail=200 || true
              elif sudo -n docker info >/dev/null 2>&1; then
                sudo -n docker compose $compose_files ps || true
                sudo -n docker compose $compose_files logs api --tail=200 || true
              fi
            }
            trap log_deploy_failure ERR
            if docker info >/dev/null 2>&1; then
              docker compose $compose_files up -d --remove-orphans
            elif sudo -n docker info >/dev/null 2>&1; then
              sudo -n docker compose $compose_files up -d --remove-orphans
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker Compose." >&2
              exit 1
            fi
          '
