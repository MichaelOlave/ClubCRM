name: CI/CD

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 10.32.1

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - uses: astral-sh/setup-uv@v7
        with:
          version: "0.10.10"

      - name: Bootstrap toolchain
        run: pnpm bootstrap

      - name: Run CI checks
        run: pnpm verify

  deploy-production:
    name: Deploy production
    runs-on: ubuntu-latest
    needs: verify
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v6

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/api/Dockerfile
          load: true
          tags: clubcrm-api:deploy

      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          load: true
          tags: clubcrm-web:deploy

      - name: Configure SSH
        env:
          DEPLOY_SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${DEPLOY_SSH_KEY:?Missing secret DEPLOY_SSH_KEY}"
          : "${DEPLOY_HOST:?Missing secret DEPLOY_HOST}"
          : "${DEPLOY_USER:?Missing secret DEPLOY_USER}"
          DEPLOY_HOST="$(printf '%s' "$DEPLOY_HOST" | tr -d '\r\n')"
          DEPLOY_USER="$(printf '%s' "$DEPLOY_USER" | tr -d '\r\n')"
          case "$DEPLOY_HOST" in
            *://*)
              echo "DEPLOY_HOST must be a hostname or IP address without a URL scheme." >&2
              exit 1
              ;;
          esac
          if ! getent ahosts "$DEPLOY_HOST" >/dev/null; then
            echo "DEPLOY_HOST did not resolve from the GitHub Actions runner. Check the secret value and DNS." >&2
            exit 1
          fi
          install -m 700 -d ~/.ssh
          printf '%s\n' "$DEPLOY_SSH_KEY" | tr -d '\r' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          {
            printf 'Host deploy-host\n'
            printf '  HostName %s\n' "$DEPLOY_HOST"
            printf '  User %s\n' "$DEPLOY_USER"
            printf '  IdentityFile ~/.ssh/id_ed25519\n'
            printf '  IdentitiesOnly yes\n'
            printf '  BatchMode yes\n'
            printf '  StrictHostKeyChecking yes\n'
          } > ~/.ssh/config
          chmod 600 ~/.ssh/config
          keyscan_output="$(mktemp)"
          keyscan_error="$(mktemp)"
          if ! ssh-keyscan -T 10 -H "$DEPLOY_HOST" >"$keyscan_output" 2>"$keyscan_error"; then
            echo "ssh-keyscan failed. Ensure the deploy host is publicly reachable on port 22 from GitHub Actions." >&2
            cat "$keyscan_error" >&2
            exit 1
          fi
          if [ ! -s "$keyscan_output" ]; then
            echo "ssh-keyscan returned no host keys. Ensure the deploy host is reachable on port 22 and serving SSH." >&2
            cat "$keyscan_error" >&2
            exit 1
          fi
          cat "$keyscan_output" >> ~/.ssh/known_hosts
          chmod 600 ~/.ssh/known_hosts

      - name: Verify SSH connectivity
        run: |
          set -euxo pipefail
          ssh deploy-host 'echo "SSH connection established"'

      - name: Upload images to deploy host
        run: |
          set -euxo pipefail
          docker save clubcrm-api:deploy | gzip -1 | ssh deploy-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '
          docker save clubcrm-web:deploy | gzip -1 | ssh deploy-host '
            set -euo pipefail
            if docker info >/dev/null 2>&1; then
              gunzip | docker load
            elif sudo -n docker info >/dev/null 2>&1; then
              gunzip | sudo -n docker load
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker." >&2
              exit 1
            fi
          '

      - name: Pull latest repo state and restart services
        run: |
          ssh deploy-host '
            set -euxo pipefail
            cd /opt/clubcrm
            GIT_SSH_COMMAND="ssh -i ~/.ssh/clubcrm-repo -o IdentitiesOnly=yes" git pull --ff-only
            compose_files="-f infra/docker-compose.production.yml"
            if [ -f infra/docker-compose.production.host-nginx.yml ]; then
              compose_files="$compose_files -f infra/docker-compose.production.host-nginx.yml"
            fi
            if docker info >/dev/null 2>&1; then
              docker compose $compose_files up -d --remove-orphans
            elif sudo -n docker info >/dev/null 2>&1; then
              sudo -n docker compose $compose_files up -d --remove-orphans
            else
              echo "Remote deploy user needs Docker access or passwordless sudo for Docker Compose." >&2
              exit 1
            fi
          '
