repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.12.10
    hooks:
      - id: ruff-check
        args: [--fix, --config=pyproject.toml]
        files: ^apps/api/.*\.py$
      - id: ruff-format
        args: [--config=pyproject.toml]
        files: ^apps/api/.*\.py$

  - repo: local
    hooks:
      - id: prettier
        name: prettier
        entry: pnpm exec prettier --write
        language: system
        files: \.(cjs|css|js|json|md|mjs|ts|tsx|yaml|yml)$
      - id: eslint
        name: eslint
        entry: pnpm lint:web
        language: system
        files: ^apps/web/.*\.(js|jsx|mjs|ts|tsx)$
        pass_filenames: false
