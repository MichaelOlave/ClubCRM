services:
  workspace:
    build:
      context: ..
      dockerfile: .devcontainer/Dockerfile
    working_dir: /workspace
    command:
      - /bin/sh
      - -lc
      - |
        python3 ./scripts/devcontainer_tcp_proxies.py \
          3000:web:3000 \
          8000:api:8000 \
          5432:postgres:5432 \
          27017:mongodb:27017 \
          6379:redis:6379 \
          9092:kafka:9092 &
        exec sleep infinity
    volumes:
      - ..:/workspace
      - pnpm_store:/pnpm/store
      - workspace_node_modules:/workspace/node_modules
      - web_node_modules:/workspace/apps/web/node_modules
      - web_next:/workspace/apps/web/.next
      - api_venv:/workspace/apps/api/.venv
    environment:
      CHOKIDAR_USEPOLLING: "true"

volumes:
  pnpm_store:
  workspace_node_modules:
  web_node_modules:
  web_next:
  api_venv:
